services:
  - type: web
    name: bridge-ai-career
    runtime: static
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://bridge-backend-mo7l.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
